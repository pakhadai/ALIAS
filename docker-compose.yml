services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: alias
      POSTGRES_USER: alias
      POSTGRES_PASSWORD: alias_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://alias:alias_dev@postgres:5432/alias
      JWT_SECRET: dev-secret-change-me
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
    depends_on:
      - redis
      - postgres

volumes:
  redis-data:
  postgres-data:
