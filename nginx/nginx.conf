# ALIAS — Production Nginx Config
# Routes:
#   /api/*          → app:3001  (Express REST)
#   /socket.io/*    → app:3001  (Socket.io WebSocket)
#   /health         → app:3001
#   everything else → client:8080 (nginx serving SPA)

upstream api {
    server app:3001;
    keepalive 32;
}

upstream spa {
    server client:8080;
    keepalive 8;
}

# ── HTTP → HTTPS redirect (+ ACME challenge for Let's Encrypt) ──────────
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;   # <-- replace with your domain

    # SSL (populated by certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff font/woff2;

    client_max_body_size 10M;

    # ── REST API ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Socket.io (WebSocket + long-polling) ────────────────
    location /socket.io/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Health check ────────────────────────────────────────
    location = /health {
        proxy_pass http://api;
        access_log off;
    }

    # ── SPA static files ────────────────────────────────────
    location / {
        proxy_pass         http://spa;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
    }
}
