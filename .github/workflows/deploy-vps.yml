# Після push у main: Quality Gate на GitHub → лише потім деплой на VPS (Docker + Prisma migrate).
#
# Потрібні GitHub Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST              — IP або hostname сервера
#   VPS_USER              — SSH-користувач (наприклад ubuntu, deploy)
#   VPS_SSH_PRIVATE_KEY   — приватний ключ SSH (повний PEM, з -----BEGIN ... END-----)
#   VPS_DEPLOY_PATH       — опційно: абсолютний шлях до клону (регістр важливий: alias ≠ ALIAS). Якщо не задано — $HOME/apps/ALIAS
#
# Опційно:
#   VPS_SSH_PORT          — порт SSH (якщо не 22)
#   VPS_SSH_PASSPHRASE    — passphrase для ключа, якщо ключ захищений
#   VPS_COMPOSE_FILE      — compose-файл у корені клону. Якщо не задано: спочатку docker-compose.npm.yml (якщо є), інакше docker-compose.prod.yml
#   VPS_ENV_FILE          — env для compose (default: .env.prod). Якщо файлу немає — використовується .env у корені клону
#   VPS_COMPOSE_PROJECT   — опційно: docker compose -p (наприклад alias), щоб імена контейнерів збігалися з VPS
#
# На VPS заздалегідь (або перший запуск workflow сам зробить clone у DEPLOY_PATH, якщо теки ще немає — потрібен публічний repo або git credentials на сервері):
#   - .env.prod або .env у корені клону (з .env.prod.example), НЕ в git
#   - docker compose v2, користувач у групі docker (або sudo без пароля для docker)
#   - Перший запуск SSL: docker-compose.prod.yml (Let's Encrypt) або NPM + docker-compose.npm.yml

name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-production
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Turbo already typechecks packages in parallel; lint/format/tests run alongside to save wall-clock time.
      - name: Typecheck, lint, format, server tests (parallel)
        run: |
          set -euo pipefail
          rc=0
          pnpm typecheck & pid_tc=$!
          pnpm lint & pid_lint=$!
          pnpm format:check & pid_fmt=$!
          pnpm test:server & pid_test=$!
          wait $pid_tc || { echo "::error::typecheck failed"; rc=1; }
          wait $pid_lint || { echo "::error::lint failed"; rc=1; }
          wait $pid_fmt || { echo "::error::format:check failed"; rc=1; }
          wait $pid_test || { echo "::error::test:server failed"; rc=1; }
          exit $rc

  deploy:
    name: Deploy to VPS
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::VPS_SSH_PRIVATE_KEY secret is empty or not set"
            exit 1
          fi
          KEY_FILE="${GITHUB_WORKSPACE}/.gha_deploy_key"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

      - name: SSH — git pull, Docker rebuild, Prisma migrate
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ${{ github.workspace }}/.gha_deploy_key
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH//$'\r'/}"
            DEPLOY_PATH="${DEPLOY_PATH#"${DEPLOY_PATH%%[![:space:]]*}"}"
            DEPLOY_PATH="${DEPLOY_PATH%"${DEPLOY_PATH##*[![:space:]]}"}"
            DEPLOY_PATH="${DEPLOY_PATH%/}"
            while [[ "$DEPLOY_PATH" == */ ]]; do DEPLOY_PATH="${DEPLOY_PATH%/}"; done
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="$HOME/apps/ALIAS"
              echo "VPS_DEPLOY_PATH not set — using default: $DEPLOY_PATH"
            fi
            COMPOSE_FILE="${{ secrets.VPS_COMPOSE_FILE }}"
            COMPOSE_FILE="${COMPOSE_FILE//$'\r'/}"
            COMPOSE_FILE="${COMPOSE_FILE#"${COMPOSE_FILE%%[![:space:]]*}"}"
            COMPOSE_FILE="${COMPOSE_FILE%"${COMPOSE_FILE##*[![:space:]]}"}"
            COMPOSE_FILE="${COMPOSE_FILE%/}"
            ENV_FILE="${{ secrets.VPS_ENV_FILE }}"
            ENV_FILE="${ENV_FILE//$'\r'/}"
            ENV_FILE="${ENV_FILE#"${ENV_FILE%%[![:space:]]*}"}"
            ENV_FILE="${ENV_FILE%"${ENV_FILE##*[![:space:]]}"}"
            [ -z "$ENV_FILE" ] && ENV_FILE=".env.prod"
            COMPOSE_PROJECT="${{ secrets.VPS_COMPOSE_PROJECT }}"
            COMPOSE_PROJECT="${COMPOSE_PROJECT//$'\r'/}"
            COMPOSE_PROJECT="${COMPOSE_PROJECT#"${COMPOSE_PROJECT%%[![:space:]]*}"}"
            COMPOSE_PROJECT="${COMPOSE_PROJECT%"${COMPOSE_PROJECT##*[![:space:]]}"}"
            DC_PFX=()
            if [ -n "$COMPOSE_PROJECT" ]; then
              DC_PFX=(-p "$COMPOSE_PROJECT")
            fi
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "Deploy directory missing — cloning ${{ github.repository }} (branch main) ..."
              mkdir -p "$(dirname "$DEPLOY_PATH")"
              git clone --depth 1 -b main "https://github.com/${{ github.repository }}.git" "$DEPLOY_PATH"
            fi
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "ERROR: $DEPLOY_PATH exists but is not a git clone. Remove the folder or set VPS_DEPLOY_PATH."
              exit 1
            fi
            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main
            sed -i '/^packages\/client$/d' .dockerignore 2>/dev/null || true
            if [ -z "$COMPOSE_FILE" ]; then
              if [ -f "docker-compose.npm.yml" ]; then
                COMPOSE_FILE="docker-compose.npm.yml"
              else
                COMPOSE_FILE="docker-compose.prod.yml"
              fi
              echo "Note: VPS_COMPOSE_FILE unset — using $COMPOSE_FILE (NPM stack avoids binding host :80 if NPM already uses it)"
            fi
            if [ ! -f "$COMPOSE_FILE" ] && [ -f "docker-compose.npm.yml" ]; then
              COMPOSE_FILE="docker-compose.npm.yml"
              echo "Note: requested compose file missing — using docker-compose.npm.yml"
            fi
            if [ ! -f "$COMPOSE_FILE" ]; then
              echo "ERROR: compose file not found: $COMPOSE_FILE — set VPS_COMPOSE_FILE or add the file to the repo."
              exit 1
            fi
            ENV_OPT=()
            if [ -f "$ENV_FILE" ]; then
              ENV_OPT=(--env-file "$ENV_FILE")
            elif [ -f ".env" ]; then
              ENV_OPT=(--env-file ".env")
              echo "Note: $ENV_FILE not found — using .env"
            else
              echo "ERROR: no env file. On the server create $ENV_FILE or .env (copy from .env.prod.example)."
              exit 1
            fi
            echo "Deploy: project=${COMPOSE_PROJECT:-default} compose=$COMPOSE_FILE env=${ENV_OPT[1]:-?}"
            docker compose "${DC_PFX[@]}" "${ENV_OPT[@]}" -f "$COMPOSE_FILE" up -d --build
            docker compose "${DC_PFX[@]}" "${ENV_OPT[@]}" -f "$COMPOSE_FILE" exec -T app sh -c "cd packages/server && npx prisma migrate deploy"
