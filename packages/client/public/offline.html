<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALIAS — Офлайн</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100svh;
      background: #121212;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px;
      text-align: center;
    }
    .logo {
      font-family: Georgia, serif;
      font-size: 48px;
      font-weight: bold;
      color: #D4AF6A;
      letter-spacing: 0.15em;
    }
    .icon { font-size: 56px; }
    .title {
      font-size: 20px;
      font-weight: bold;
      color: rgba(255,255,255,0.85);
    }
    .sub {
      font-size: 14px;
      color: rgba(255,255,255,0.35);
      max-width: 260px;
      line-height: 1.6;
    }
    .btn {
      margin-top: 8px;
      padding: 14px 32px;
      border-radius: 999px;
      background: #D4AF6A;
      color: #000;
      font-weight: bold;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="logo">ALIAS</div>
  <div class="icon">📡</div>
  <p class="title">Немає з'єднання</p>
  <p class="sub">Перевірте підключення до інтернету і спробуйте знову.</p>
  <button class="btn" onclick="location.reload()">Спробувати знову</button>
</body>
</html>
